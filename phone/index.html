<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Pictinder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="loading">Loading…</div>
  <div id="empty" class="hidden">No media in this folder.</div>

  <div id="joinScreen" class="screen hidden">
    <h2>Join Pictinder</h2>
    <button type="button" id="btnCreateAlbum" class="btn-join primary">Create new album</button>
    <button type="button" id="btnJoinAlbum" class="btn-join secondary">Join existing album</button>
  </div>

  <div id="createScreen" class="screen hidden">
    <h2>New album</h2>
    <input type="text" id="albumName" placeholder="Album name" />
    <label class="mode-option"><input type="radio" name="mode" value="shared" checked /> Show all photos to everyone</label>
    <label class="mode-option"><input type="radio" name="mode" value="distributed" /> Distribute photos across devices</label>
    <button type="button" id="btnCreateSubmit" class="btn-join primary">Create</button>
  </div>

  <div id="joinListScreen" class="screen hidden">
    <h2>Choose album</h2>
    <div id="albumList"></div>
  </div>

  <div id="app" class="hidden">
    <div class="top-bar">
      <div class="status-indicator">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Connecting…</span>
      </div>
      <button type="button" id="albumExplorerBtn" class="top-bar-btn" title="Albums">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="7" height="7" rx="1.5"/>
          <rect x="11" y="2" width="7" height="7" rx="1.5"/>
          <rect x="2" y="11" width="7" height="7" rx="1.5"/>
          <rect x="11" y="11" width="7" height="7" rx="1.5"/>
        </svg>
      </button>
    </div>
    <div id="cardStack">
      <div id="currentCard" class="card">
        <div class="media-wrap">
          <div class="meta-overlay-wrap">
            <div class="meta-overlay-top">
              <div id="metaOverlayPath" class="meta-overlay-line meta-overlay-center" aria-hidden="true"></div>
              <div id="metaOverlayFilename" class="meta-overlay-line meta-overlay-center" aria-hidden="true"></div>
            </div>
            <div class="meta-overlay-row">
              <div id="metaOverlayLeft" class="meta-overlay meta-overlay-left" aria-hidden="true"></div>
              <div id="metaOverlayRight" class="meta-overlay meta-overlay-right" aria-hidden="true"></div>
            </div>
          </div>
          <img id="currentImg" alt="" />
          <video id="currentVideo" class="hidden" controls loop playsinline></video>
        </div>
      </div>
    </div>
    <div class="bottom-controls">
      <div class="bottom-actions">
        <button type="button" id="undoBtn" class="pill-btn hidden" title="Undo last swipe">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 8l-3 3 3 3"/><path d="M1 11h12a5 5 0 0 1 0 10H8"/>
          </svg>
          Undo
        </button>
        <button type="button" id="shareBtn" class="pill-btn" title="Share this photo/video">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
            <polyline points="16 6 12 2 8 6"/>
            <line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
          Share
        </button>
        <button type="button" id="saveBtn" class="pill-btn" title="Save to device">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Save
        </button>
      </div>
      <div class="hint">Swipe right = select · left = skip</div>
      <div class="progress"><span id="progressText">0 / 0</span></div>
    </div>
  </div>

  <div id="albumExplorer" class="overlay hidden">
    <div class="overlay-backdrop" id="explorerBackdrop"></div>
    <div class="overlay-panel">
      <div class="overlay-header">
        <h3>Albums</h3>
        <button type="button" id="closeExplorer" class="overlay-close">&times;</button>
      </div>
      <div class="explorer-settings-label">Album settings · Name, mode, progress. Delete from the button below.</div>
      <div id="explorerAlbumList" class="explorer-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
